<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Image Gallery</h1>

    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <div class="gallery">
        <img src="images/img1.jpg" class="gallery-item nature" onclick="openLightbox(0)">
        <img src="images/img2.jpg" class="gallery-item nature" onclick="openLightbox(1)">
        <img src="images/img3.jpg" class="gallery-item city" onclick="openLightbox(2)">
        <img src="images/img4.jpg" class="gallery-item animals" onclick="openLightbox(3)">
        <img src="images/img5.jpg" class="gallery-item animals" onclick="openLightbox(4)">
        <img src="images/img6.jpg" class="gallery-item animals" onclick="openLightbox(5)">
        <img src="images/img7.jpg" class="gallery-item city" onclick="openLightbox(6)">

    </div>


    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img">
        <button class="prev" onclick="changeImage(-1)">❮</button>
        <button class="next" onclick="changeImage(1)">❯</button>
    </div>


<script src="script.js"></script>

</body>
</html>
